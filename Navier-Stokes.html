<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>냉장고 유동해석</title>
<style>
  :root{
    --bg:#04070c;--hair:rgba(132,186,224,0.13);--hair-strong:rgba(132,186,224,0.26);
    --ink:#a7b8c9;--ink-dim:#566678;--ink-faint:#384450;--cyan:#7fe0ff;--cyan-dim:#3a6680;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#02040a;}
  body{color:var(--ink);font-family:ui-monospace,"SFMono-Regular","SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    -webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:18px;}
  .frame{width:100%;max-width:780px;border:1px solid var(--hair-strong);
    background:linear-gradient(180deg,#070b12,#04070c);box-shadow:0 24px 70px -32px rgba(0,0,0,0.92),inset 0 0 0 1px rgba(0,0,0,0.4);}
  .head{padding:13px 16px 12px;border-bottom:1px solid var(--hair);display:flex;flex-direction:column;gap:9px;}
  .eyebrow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-dim);}
  .eyebrow b{color:var(--ink);font-weight:600;letter-spacing:0.16em;}
  .eyebrow .tag{color:var(--cyan-dim);}
  .eq{font-size:12.5px;line-height:1.5;color:var(--ink);letter-spacing:0.01em;white-space:nowrap;overflow-x:auto;padding-bottom:1px;}
  .eq .op{color:var(--cyan);}.eq .sub{font-size:0.76em;vertical-align:-0.2em;color:var(--ink-dim);}
  .eq .sup{font-size:0.76em;vertical-align:0.42em;}.eq::-webkit-scrollbar{height:0;}
  .stage{position:relative;width:100%;aspect-ratio:120/84;background:#03060c;overflow:hidden;border-bottom:1px solid var(--hair);}
  .stage canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
  #field{image-rendering:auto;}#ice{display:none;}
  .vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 90px -22px rgba(0,0,0,0.85);}
  .axis{position:absolute;pointer-events:none;color:var(--ink-faint);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;}
  .axis.g{left:10px;top:9px;}.axis.t{right:10px;bottom:8px;}
  .paused-tag{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--ink);font-size:11px;letter-spacing:0.3em;
    border:1px solid var(--hair-strong);padding:7px 14px;background:rgba(5,8,14,0.7);text-transform:uppercase;display:none;}
  .paused .paused-tag{display:block;}
  .console{padding:13px 16px 15px;display:flex;flex-direction:column;gap:13px;}
  .row{display:flex;align-items:center;gap:16px;}
  .field{display:flex;align-items:baseline;gap:9px;}
  .field .lab{font-size:10.5px;letter-spacing:0.14em;color:var(--ink-dim);text-transform:uppercase;}
  .field .val{font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:0.02em;}
  .phase{font-size:10.5px;letter-spacing:0.12em;color:var(--cyan);text-transform:uppercase;transition:color .4s;}
  .spacer{flex:1;}
  .strip{display:flex;align-items:center;gap:13px;flex-wrap:wrap;}
  .bar-wrap{display:flex;align-items:center;gap:8px;}
  .bar{width:128px;height:9px;border:1px solid var(--hair);background:linear-gradient(90deg,rgb(7,12,21) 0%,rgb(22,52,86) 40%,rgb(110,168,210) 72%,rgb(226,244,255) 100%);}
  .bar-cap{font-size:9.5px;letter-spacing:0.1em;color:var(--ink-faint);text-transform:uppercase;}
  .btn{font:inherit;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-dim);background:transparent;border:1px solid var(--hair);padding:6px 11px;cursor:pointer;transition:.18s;}
  .btn:hover{color:var(--cyan);border-color:var(--cyan-dim);}.btn:active{transform:translateY(1px);}
  .foot{padding:9px 16px 12px;border-top:1px solid var(--hair);font-size:9.5px;line-height:1.6;letter-spacing:0.04em;color:var(--ink-faint);}
  .foot .sep{color:var(--hair-strong);padding:0 5px;}
  @media (max-width:540px){body{padding:0;}.frame{border-left:none;border-right:none;}.eq{font-size:10.5px;}.row{gap:10px;}.bar{width:88px;}}

<body>
<div class="frame" id="frame">
  <div class="head">
    <div class="eyebrow"><span><b>FIG. 3</b> &nbsp;냉장고 유동해석</span><span class="tag">2D 비정상 해석</span></div>
    <div class="eq">∂<span class="op">u</span>/∂t + (<span class="op">u</span>·∇)<span class="op">u</span> = −∇p/ρ + ν∇<span class="sup">2</span><span class="op">u</span>
      + βg(T−T<span class="sub">0</span>)<span class="op">ŷ</span> &nbsp;,&nbsp; ∇·<span class="op">u</span> = 0</div>
  </div>
  <div class="stage" id="stage">
    <canvas id="field"></canvas>
    <canvas id="ice"></canvas>
    <canvas id="flow"></canvas>
    <div class="vig"></div>
    <div class="axis g">g ↓</div>
    <div class="axis t">착상-제상 반복</div>
    <div class="paused-tag">일시정지</div>
  </div>
  <div class="console">
    <div class="row">
      <div class="field"><span class="lab">착상 두께&nbsp; δ</span><span class="val" id="delta">0.00 mm</span></div>
      <span class="spacer"></span>
      <span class="phase" id="phase">착상 진행</span>
    </div>
    <div class="strip">
      <div class="bar-wrap"><div class="bar"></div><span class="bar-cap">밝을수록 차가움 · 백색 = 착상</span></div>
      <span class="spacer"></span>
      <button class="btn" id="pause">정지</button>
      <button class="btn" id="reset">재설정</button>
    </div>
  </div>
  <div class="foot">
    경계조건: 냉장고 표면 θ=0 (냉벽)<span class="sep">·</span>외벽 주위 등온<span class="sep">·</span>부력 자연대류<span class="sep">·</span>표면 응결·착상 → 임계 두께 시 제상(융해)<span class="sep">·</span>격자 <span id="meshN">120×84</span>
    <br>유동은 Navier–Stokes 방정식을, 착상층은 표면 질량수지를 실시간으로 적분한 것임.
  </div>
</div>
 
<script>
"use strict";
(function(){
  const stage=document.getElementById('stage'),fieldC=document.getElementById('field'),iceC=document.getElementById('ice'),flowC=document.getElementById('flow');
  const fctx=fieldC.getContext('2d'),ictx=iceC.getContext('2d'),pctx=flowC.getContext('2d');
  const small=Math.min(window.innerWidth,window.innerHeight)<560;
  const W=small?92:120, H=small?64:84, stride=W+2, SZ=(W+2)*(H+2);
  document.getElementById('meshN').textContent=W+"×"+H;
  const projIters=small?13:16, tempIters=6, dt=1.0, vmax=3.0, buoy=3.2, noiseAmp=0.018;
  fieldC.width=W; fieldC.height=H; iceC.width=W; iceC.height=H;
 
  const u=new Float32Array(SZ),v=new Float32Array(SZ),u0=new Float32Array(SZ),v0=new Float32Array(SZ);
  const T=new Float32Array(SZ),T0=new Float32Array(SZ),p=new Float32Array(SZ),divg=new Float32Array(SZ);
  const solidBase=new Uint8Array(SZ), solid=new Uint8Array(SZ), ice=new Float32Array(SZ), SP=new Float32Array(SZ);
 
  // fridge standing on floor (cold) — side view
  const half=Math.max(7,Math.round(0.09*W)), cx=Math.round(W*0.5), fx0=cx-half, fx1=cx+half-1;
  const fh=Math.round(0.55*H), jtop=H-fh+1;
  function buildBase(){ solidBase.fill(0);
    for(let j=jtop;j<=H;j++)for(let i=fx0;i<=fx1;i++) solidBase[i+stride*j]=1;
    for(let i=0;i<SZ;i++) SP[i]=Math.random();
  }
  const ICE_SOLID=0.55, ICE_MAX=1.5;
  function recomputeSolid(){
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;
      solid[idx]=(solidBase[idx]||ice[idx]>ICE_SOLID)?1:0;}}
  }
 
  // ---- cycle ----
  let phase='accrete', Tfrac=0.09, depRate=0.020, riv=[];
  function newCycle(){ Tfrac=0.055+0.075*Math.random(); depRate=0.018*(0.75+0.5*Math.random()); }
  function spawnRivulets(){
    riv=[]; const n=3+(Math.random()*4|0);
    // pick columns that are iced
    const cols=[]; for(let i=fx0-half;i<=fx1+half;i++){ if(i<2||i>W-1)continue;
      let top=-1; for(let j=1;j<=H;j++){ if(ice[i+stride*j]>ICE_SOLID){top=j;break;} } if(top>0) cols.push([i,top]); }
    for(let k=0;k<n;k++){ const c=cols.length?cols[(Math.random()*cols.length)|0]:[cx,jtop];
      riv.push({x:c[0]+(Math.random()-0.5)*2, y:c[1], sp:0.6+Math.random()*1.0, w:1.4+Math.random()*1.6, trail:[]}); }
  }
 
  function reset(){ u.fill(0);v.fill(0);u0.fill(0);v0.fill(0);T.fill(0);T0.fill(0);p.fill(0);divg.fill(0);ice.fill(0);
    buildBase(); recomputeSolid(); for(let i=0;i<SZ;i++) if(solid[i]) T[i]=-1; phase='accrete'; newCycle(); riv=[];
    pctx.clearRect(0,0,flowC.width,flowC.height); seedParticles(); }
 
  // ---- solver (Boussinesq natural convection) ----
  function set_bnd(b,x){
    for(let j=1;j<=H;j++){x[0+stride*j]=(b===1)?-x[1+stride*j]:x[1+stride*j];x[(W+1)+stride*j]=(b===1)?-x[W+stride*j]:x[W+stride*j];}
    for(let i=1;i<=W;i++){x[i]=(b===2)?-x[i+stride]:x[i+stride];x[i+stride*(H+1)]=(b===2)?-x[i+stride*H]:x[i+stride*H];}
    x[0]=0.5*(x[1]+x[stride]);x[stride*(H+1)]=0.5*(x[1+stride*(H+1)]+x[stride*H]);
    x[(W+1)]=0.5*(x[W]+x[(W+1)+stride]);x[(W+1)+stride*(H+1)]=0.5*(x[W+stride*(H+1)]+x[(W+1)+stride*H]);
  }
  function lin_solve(b,x,x_0,a,c,iters){const ci=1/c;
    for(let k=0;k<iters;k++){for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;if(solid[idx])continue;
      x[idx]=(x_0[idx]+a*(x[idx-1]+x[idx+1]+x[idx-stride]+x[idx+stride]))*ci;}}set_bnd(b,x);}}
  function project(){
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;
      divg[idx]=-0.5*(u[idx+1]-u[idx-1]+v[idx+stride]-v[idx-stride]);p[idx]=0;}}
    set_bnd(0,divg);set_bnd(0,p);lin_solve(0,p,divg,1,4,projIters);
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;if(solid[idx])continue;
      u[idx]-=0.5*(p[idx+1]-p[idx-1]);v[idx]-=0.5*(p[idx+stride]-p[idx-stride]);}}
    set_bnd(1,u);set_bnd(2,v);
  }
  function advect(b,d,d_0,uu,vv){
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;
      if(solid[idx]){d[idx]=(b===0)?-1:0;continue;}
      let x=i-dt*uu[idx],y=j-dt*vv[idx];
      if(x<0.5)x=0.5;else if(x>W+0.5)x=W+0.5;if(y<0.5)y=0.5;else if(y>H+0.5)y=H+0.5;
      const i0=x|0,j0=y|0,i1=i0+1,j1=j0+1,s1=x-i0,s0=1-s1,t1=y-j0,t0=1-t1,a0=j0*stride,a1=j1*stride;
      d[idx]=s0*(t0*d_0[i0+a0]+t1*d_0[i0+a1])+s1*(t0*d_0[i1+a0]+t1*d_0[i1+a1]);}}
    set_bnd(b,d);
  }
  function applyTempBC(){
    for(let j=0;j<=H+1;j++){T[0+stride*j]=0;T[(W+1)+stride*j]=0;}
    for(let i=0;i<=W+1;i++){T[i]=0;T[i+stride*(H+1)]=0;}
    for(let idx=0;idx<SZ;idx++) if(solid[idx]) T[idx]=-1;
  }
 
  // ---- frost accretion / defrost ----
  let coverage=0, maxIce=0;
  function accrete(){
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;
      if(solid[idx])continue;
      const cold=-T[idx]; if(cold<0.16)continue;
      const nearSolid=solid[idx-1]||solid[idx+1]||solid[idx-stride]||solid[idx+stride];
      const onFloor=(j>=H-1);
      if(!nearSolid&&!onFloor)continue;
      const sp=Math.hypot(u[idx],v[idx]); const slow=Math.max(0,1-sp/1.2);
      const settle=onFloor?1.35:1.0;
      let g=ice[idx]+depRate*cold*(0.4+0.6*slow)*settle*(0.7+0.6*Math.random());
      if(g>ICE_MAX)g=ICE_MAX; ice[idx]=g;
    }}
  }
  function melt(){
    for(let i=0;i<SZ;i++) if(ice[i]>0) ice[i]*=0.965;
    for(const r of riv){
      r.y+=r.sp; r.x+=(Math.random()-0.5)*0.5;
      r.trail.push([r.x,r.y]); if(r.trail.length>24) r.trail.shift();
      const cxr=Math.round(r.x),cyr=Math.round(r.y),rad=Math.max(1,Math.round(r.w));
      for(let dy=-rad;dy<=rad;dy++)for(let dx=-rad;dx<=rad;dx++){const xx=cxr+dx,yy=cyr+dy;
        if(xx<1||xx>W||yy<1||yy>H)continue; if(dx*dx+dy*dy<=rad*rad) ice[xx+stride*yy]*=0.4;}
    }
    riv=riv.filter(r=>r.y<H+2);
  }
  function accretionStep(){
    if(phase==='accrete'){ accrete();
      // measure
      let sum=0,mx=0,iced=0; for(let i=0;i<SZ;i++){ if(ice[i]>0){sum+=ice[i]; if(ice[i]>mx)mx=ice[i]; if(ice[i]>ICE_SOLID)iced++;} }
      coverage=iced/SZ; maxIce=mx;
      if(coverage>=Tfrac){ phase='melt'; spawnRivulets(); }
    } else {
      melt();
      let mx=0,iced=0; for(let i=0;i<SZ;i++){ if(ice[i]>mx)mx=ice[i]; if(ice[i]>ICE_SOLID)iced++; }
      coverage=iced/SZ; maxIce=mx;
      if(coverage<0.004 && riv.length===0){ for(let i=0;i<SZ;i++) ice[i]=0; phase='accrete'; newCycle(); }
    }
  }
 
  function step(){
    recomputeSolid();
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){const idx=i+row;if(solid[idx])continue;
      v[idx]+=dt*(-buoy)*T[idx]; v[idx]+=(Math.random()-0.5)*noiseAmp; u[idx]+=(Math.random()-0.5)*noiseAmp;
      const sp=Math.hypot(u[idx],v[idx]);if(sp>vmax){const s=vmax/sp;u[idx]*=s;v[idx]*=s;}}}
    set_bnd(1,u);set_bnd(2,v); project();
    u0.set(u);v0.set(v); advect(1,u,u0,u0,v0); advect(2,v,v0,u0,v0); project();
    T0.set(T); lin_solve(0,T,T0,0.00009*W*H,1+4*0.00009*W*H,tempIters); T0.set(T); advect(0,T,T0,u,v); applyTempBC();
    accretionStep();
  }
 
  // ---- particles (cold cascade) ----
  const NP=small?1600:3200;
  const px=new Float32Array(NP),py=new Float32Array(NP),ox=new Float32Array(NP),oy=new Float32Array(NP),life=new Float32Array(NP);
  function respawn(k){let i,j,t=0;do{px[k]=1+Math.random()*(W-1);py[k]=1+Math.random()*(H-1);
    i=Math.round(px[k]);j=Math.round(py[k]);t++;}while(solid[i+stride*j]&&t<8);ox[k]=px[k];oy[k]=py[k];life[k]=60+Math.random()*200;}
  function seedParticles(){for(let k=0;k<NP;k++)respawn(k);}
  function sU(x,y){if(x<1)x=1;else if(x>W)x=W;if(y<1)y=1;else if(y>H)y=H;
    const i0=x|0,j0=y|0,i1=i0+1,j1=j0+1,s1=x-i0,s0=1-s1,t1=y-j0,t0=1-t1,a0=j0*stride,a1=j1*stride;
    return s0*(t0*u[i0+a0]+t1*u[i0+a1])+s1*(t0*u[i1+a0]+t1*u[i1+a1]);}
  function sV(x,y){if(x<1)x=1;else if(x>W)x=W;if(y<1)y=1;else if(y>H)y=H;
    const i0=x|0,j0=y|0,i1=i0+1,j1=j0+1,s1=x-i0,s0=1-s1,t1=y-j0,t0=1-t1,a0=j0*stride,a1=j1*stride;
    return s0*(t0*v[i0+a0]+t1*v[i0+a1])+s1*(t0*v[i1+a0]+t1*v[i1+a1]);}
  function sT(x,y){let i=Math.round(x),j=Math.round(y);if(i<1)i=1;else if(i>W)i=W;if(j<1)j=1;else if(j>H)j=H;return T[i+stride*j];}
 
  // ---- colormaps ----
  const stops=[[0,9,15,26],[0.3,20,52,90],[0.58,40,118,180],[0.8,110,196,236],[1,212,244,255]];
  const lutR=new Uint8Array(256),lutG=new Uint8Array(256),lutB=new Uint8Array(256);
  for(let k=0;k<256;k++){const t=k/255;let a=stops[0],b=stops[stops.length-1];
    for(let s=0;s<stops.length-1;s++){if(t>=stops[s][0]&&t<=stops[s+1][0]){a=stops[s];b=stops[s+1];break;}}
    const f=(t-a[0])/Math.max(1e-6,(b[0]-a[0]));lutR[k]=a[1]+(b[1]-a[1])*f;lutG[k]=a[2]+(b[2]-a[2])*f;lutB[k]=a[3]+(b[3]-a[3])*f;}
 
  const fimg=fctx.createImageData(W,H),fd=fimg.data;
  function renderField(){
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){
      let c=-T[i+row]; if(c<0)c=0;else if(c>1)c=1;
      const k=(Math.sqrt(c)*255)|0, o=((i-1)+(j-1)*W)<<2;
      fd[o]=lutR[k];fd[o+1]=lutG[k];fd[o+2]=lutB[k];fd[o+3]=255;}}
    fctx.putImageData(fimg,0,0);
  }
  const iimg=ictx.createImageData(W,H),id=iimg.data;
  function renderIce(flick){
    for(let j=1;j<=H;j++){const row=stride*j;for(let i=1;i<=W;i++){
      const idx=i+row, o=((i-1)+(j-1)*W)<<2; let t=ice[idx]/ICE_MAX; if(t<=0.01){id[o+3]=0;continue;}
      if(t>1)t=1; const spk=0.8+0.4*SP[idx];
      let bump=0; if(t>0.4 && ((SP[idx]*53+flick)%1)>0.85) bump=55;
      id[o]=Math.min(255,198*spk+bump);id[o+1]=Math.min(255,228*spk+bump);id[o+2]=255;
      id[o+3]=Math.min(255, t*240*spk+bump);}}
    ictx.putImageData(iimg,0,0);
  }
 
  let cw=0,ch=0,sx=1,sy=1;
  function resize(){const r=stage.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);
    cw=Math.max(1,Math.round(r.width*dpr));ch=Math.max(1,Math.round(r.height*dpr));flowC.width=cw;flowC.height=ch;sx=cw/W;sy=ch/H;}
 
  function drawFridge(){
    pctx.globalCompositeOperation='source-over';
    const left=(fx0-0.5)*sx,top=(jtop-0.5)*sy,w=((fx1-fx0)+1)*sx,h=((H-jtop)+1.5)*sy;
    const g=pctx.createLinearGradient(left,0,left+w,0);
    g.addColorStop(0,'#0d1722');g.addColorStop(0.5,'#16222f');g.addColorStop(1,'#0d1722');
    pctx.fillStyle=g;pctx.fillRect(left,top,w,h);
    const sh=pctx.createLinearGradient(left,0,left+w,0);
    sh.addColorStop(0,'rgba(150,210,240,0.22)');sh.addColorStop(0.12,'rgba(150,210,240,0)');
    sh.addColorStop(0.88,'rgba(150,210,240,0)');sh.addColorStop(1,'rgba(150,210,240,0.18)');
    pctx.fillStyle=sh;pctx.fillRect(left,top,w,h);
    pctx.strokeStyle='rgba(150,210,240,0.12)';pctx.lineWidth=1;
    pctx.beginPath();const seam=top+h*0.30;pctx.moveTo(left+sx,seam);pctx.lineTo(left+w-sx,seam);pctx.stroke();
    pctx.strokeStyle='rgba(150,210,240,0.30)';pctx.strokeRect(left+0.5,top+0.5,w-1,h-1);
  }
  const SL=1.55;
  function drawParticles(){
    pctx.globalCompositeOperation='lighter';pctx.lineCap='round';
    for(let k=0;k<NP;k++){const X=px[k],Y=py[k];const uu=sU(X,Y),vv=sV(X,Y);
      let c=-sT(X,Y);if(c<0)c=0;else if(c>1)c=1;const cg=Math.sqrt(c);const sp=Math.hypot(uu,vv);
      const br=0.42+0.58*cg, r=(80+130*cg)*br,g=(150+90*cg)*br,b=(200+55*cg)*br;
      const a=(0.14+0.5*cg)*Math.min(1,0.4+sp*0.55);
      pctx.strokeStyle='rgba('+(r|0)+','+(g|0)+','+(b|0)+','+a.toFixed(3)+')';
      pctx.lineWidth=Math.max(0.6,0.7+0.8*cg);
      const bx=X-uu*SL,by=Y-vv*SL;
      pctx.beginPath();pctx.moveTo((bx-0.5)*sx,(by-0.5)*sy);pctx.lineTo((X-0.5)*sx,(Y-0.5)*sy);pctx.stroke();}
    pctx.globalCompositeOperation='source-over';
  }
  function drawRivulets(){
    if(phase!=='melt')return;
    pctx.globalCompositeOperation='lighter';pctx.lineCap='round';
    for(const r of riv){ if(r.trail.length<2)continue;
      for(let i=1;i<r.trail.length;i++){const a0=r.trail[i-1],a1=r.trail[i],fade=i/r.trail.length;
        pctx.strokeStyle='rgba(186,228,255,'+(0.30*fade).toFixed(3)+')';pctx.lineWidth=Math.max(1,1.6*fade);
        pctx.beginPath();pctx.moveTo((a0[0]-0.5)*sx,(a0[1]-0.5)*sy);pctx.lineTo((a1[0]-0.5)*sx,(a1[1]-0.5)*sy);pctx.stroke();}
      const h=r.trail[r.trail.length-1];pctx.fillStyle='rgba(216,242,255,0.5)';
      pctx.beginPath();pctx.arc((h[0]-0.5)*sx,(h[1]-0.5)*sy,Math.max(1.2,sx*0.5),0,6.2832);pctx.fill();}
    pctx.globalCompositeOperation='source-over';
  }
  function moveParticles(){
    for(let k=0;k<NP;k++){ox[k]=px[k];oy[k]=py[k];
      px[k]+=sU(px[k],py[k])*1.15;py[k]+=sV(px[k],py[k])*1.15;life[k]-=1;
      const i=Math.round(px[k]),j=Math.round(py[k]);
      if(px[k]<0.5||px[k]>W||py[k]<0.5||py[k]>H||life[k]<=0||(i>=0&&i<=W+1&&j>=0&&j<=H+1&&solid[i+stride*j])) respawn(k);}
  }
 
  let frame=0,paused=false;
  function render(){
    renderField();
    pctx.clearRect(0,0,cw,ch);
    moveParticles(); drawParticles();
    drawFridge();
    renderIce((frame*0.013)%1);
    pctx.imageSmoothingEnabled=true; pctx.drawImage(iceC,0,0,W,H,0,0,cw,ch);
    drawRivulets();
  }
  function tick(){ if(!paused){ step(); render();
    if((frame++%12)===0){ document.getElementById('delta').textContent=(maxIce*3.0).toFixed(2)+" mm";
      const ph=document.getElementById('phase');
      if(phase==='accrete'){ph.textContent='착상 진행';ph.style.color='#7fe0ff';}else{ph.textContent='제상 — 융해';ph.style.color='#9fd0e8';}
    }} requestAnimationFrame(tick); }
 
  document.getElementById('reset').addEventListener('click',reset);
  const pb=document.getElementById('pause');
  pb.addEventListener('click',()=>{paused=!paused;document.getElementById('frame').classList.toggle('paused',paused);pb.textContent=paused?'재생':'정지';});
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,120);});
 
  reset(); resize();
  for(let s=0;s<40;s++) step();
  render(); requestAnimationFrame(tick);
})();
</script>
</body>
</html>
