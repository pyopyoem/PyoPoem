<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>　</title>
<style>
  html,body{margin:0;height:100%;background:#08243a;overflow:hidden;}
  body{display:flex;align-items:center;justify-content:center;}
  #c{display:block;width:100vw;height:100vh;cursor:crosshair;touch-action:none;}
  .hint{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:15px;letter-spacing:0.24em;
    color:rgba(200,225,240,0.62);pointer-events:none;text-transform:uppercase;transition:opacity 1.2s;
    text-shadow:0 1px 12px rgba(0,20,40,0.6);}
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hint" id="hint">touch the surface</div>
<script>
"use strict";
(function(){
  const cv=document.getElementById('c'), ctx=cv.getContext('2d');
  let W=0,H=0,DPR=1;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=cv.clientWidth; H=cv.clientHeight;
    cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize',resize); resize();

  // slower speeds so reflections are clearly visible
  const C_SURF=120, C_ECHO=104, RING=13;
  const surf=[], echo=[];

  function emit(x,y,strength){
    const t=performance.now();
    const w={x,y,t0:t,amp:strength,pend:[]};
    w.pend.push({wall:'l', at:t + (x)/C_SURF*1000,     done:false});
    w.pend.push({wall:'r', at:t + (W-x)/C_SURF*1000,   done:false});
    w.pend.push({wall:'tp',at:t + (y)/C_SURF*1000,     done:false});
    w.pend.push({wall:'bt',at:t + (H-y)/C_SURF*1000,   done:false});
    surf.push(w);
  }
  function spawnEcho(x,y,t0,wall,amp){
    let sx=x,sy=y;
    if(wall==='l')sx=-x; else if(wall==='r')sx=2*W-x; else if(wall==='tp')sy=-y; else if(wall==='bt')sy=2*H-y;
    echo.push({x:sx,y:sy,t0,amp:amp*0.9});
  }

  // ---- pressure / overload / exhaustion ----
  // clicks are the engine. ~7 clicks -> overload. exhaustion holds 3s (no response),
  // then resets. clicks during exhaustion are queued and fire on reset (never feels dead-locked).
  const OVERLOAD=5;            // clicks (at full strength) to reach overload
  const PER_CLICK=1/OVERLOAD;  // load added per click
  let load=0, phase='idle', exhaustT=0, lastAuto=0, started=false, last=performance.now();
  let queued=0;                // clicks pressed during exhaustion
  const AUTO_EVERY=7000;       // occasional self-performed wave

  function margin(){ return Math.min(W,H)*0.12; }
  function autoEmit(){ emit(margin()+Math.random()*(W-2*margin()), margin()+Math.random()*(H-2*margin()), 0.8); }

  function pt(e){ const r=cv.getBoundingClientRect();
    return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; }
  function poke(e){
    const p=pt(e);
    if(phase==='exhausted'){ queued++; return; }   // surface won't respond yet; remember the press
    emit(p.x,p.y,1.0);
    load=Math.min(1.3, load+PER_CLICK);
    if(phase==='idle') phase='perform';
    if(load>=1.0){ phase='exhausted'; exhaustT=performance.now(); }
    const h=document.getElementById('hint'); if(h) h.style.opacity='0'; started=true;
  }
  cv.addEventListener('mousedown',poke);
  cv.addEventListener('touchstart',function(e){ e.preventDefault(); poke(e); },{passive:false});

  function ring(x,y,r){ ctx.beginPath(); ctx.arc(x,y,Math.max(0.1,r),0,6.2832); }

  function frame(now){
    const dt=Math.min(50, now-last); last=now;

    // occasional self-wave (only while not overloaded/exhausted)
    if(phase!=='exhausted'){
      if(now-lastAuto>AUTO_EVERY){ if(phase!=='idle'||Math.random()<0.5) autoEmit(); lastAuto=now; if(phase==='idle')phase='perform'; }
    }

    // pressure relaxes slowly when you stop clicking (so it must be driven)
    if(phase==='perform'){
      load=Math.max(0, load - 0.00012*dt);
      if(load<=0 && surf.length===0 && echo.length===0) phase='idle';
    }

    // exhaustion: hold 3s with no response; everything fades flat; then reset
    let exFade=0;
    if(phase==='exhausted'){
      const e=now-exhaustT;
      exFade=Math.min(1, e/600);          // how "flattened" we are (kills waves quickly)
      if(e>=5000){
        phase='perform'; load=0; lastAuto=now;
        // honor presses made during the silence: one gentle wave back to life
        if(queued>0){ emit(W*0.5,H*0.5,0.8); queued=0; }
        else emit(W*0.5,H*0.5,0.7);
      }
    }

    // ---- background water ----
    ctx.globalCompositeOperation='source-over';
    // during exhaustion, fade faster (surface goes flat/still)
    const smear = phase==='exhausted' ? (0.26+0.5*exFade) : 0.26;
    ctx.fillStyle='rgba(10,40,62,'+smear.toFixed(3)+')'; ctx.fillRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'rgba(12,52,78,0.05)'); bg.addColorStop(1,'rgba(5,24,40,0.07)');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    ctx.globalCompositeOperation='lighter';
    const maxR=Math.hypot(W,H);
    const killing = phase==='exhausted';

    // surface waves
    for(let i=surf.length-1;i>=0;i--){
      const w=surf[i]; const age=(now-w.t0)/1000; if(age<0) continue;
      const r=age*C_SURF;
      let fade=1/(1+r*0.006);
      if(killing) fade*=(1-exFade);                 // forced flattening during exhaustion
      if(!killing){ for(const pnd of w.pend){ if(!pnd.done && now>=pnd.at){ pnd.done=true; spawnEcho(w.x,w.y,pnd.at,pnd.wall, (1/(1+r*0.006))*0.6*w.amp+0.3);} } }
      if(r>maxR*1.15 || fade<0.05){ surf.splice(i,1); continue; }
      const a=fade*0.55*w.amp;
      ctx.lineWidth=RING*(0.45+0.7*fade);
      ctx.strokeStyle='rgba(216,236,255,'+a.toFixed(3)+')'; ring(w.x,w.y,r); ctx.stroke();
      ctx.lineWidth=1.3;
      ctx.strokeStyle='rgba(238,248,255,'+(a*0.85).toFixed(3)+')'; ring(w.x,w.y,r); ctx.stroke();
    }
    // echoes
    for(let i=echo.length-1;i>=0;i--){
      const w=echo[i]; const age=(now-w.t0)/1000; if(age<0) continue;
      const r=age*C_ECHO;
      let fade=1/(1+r*0.007);
      if(killing) fade*=(1-exFade);
      if(r>maxR*1.35 || fade<0.05){ echo.splice(i,1); continue; }
      const a=fade*0.6*w.amp;
      ctx.lineWidth=RING*(0.6+0.8*fade);
      ctx.strokeStyle='rgba(22,58,140,'+a.toFixed(3)+')'; ring(w.x,w.y,r); ctx.stroke();
      ctx.lineWidth=2.0;
      ctx.strokeStyle='rgba(40,92,190,'+(a*0.85).toFixed(3)+')'; ring(w.x,w.y,r); ctx.stroke();
    }

    // ---- pressure glaze: clearly builds with load (the surface getting overwhelmed) ----
    if(load>0.04 && !killing){
      const hz=Math.min(0.34, load*0.34);
      const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.75);
      g.addColorStop(0,'rgba(30,84,150,'+(hz*0.45).toFixed(3)+')');
      g.addColorStop(1,'rgba(16,52,98,'+hz.toFixed(3)+')');
      ctx.globalCompositeOperation='lighter'; ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
      // near overload: faint trembling vignette
      if(load>0.7){
        const tr=(load-0.7)/0.3;
        const j=Math.sin(now*0.04)*tr*0.06;
        ctx.fillStyle='rgba(60,110,190,'+(0.06*tr+Math.abs(j)).toFixed(3)+')';
        ctx.fillRect(0,0,W,H);
      }
    }

    requestAnimationFrame(frame);
  }

  setTimeout(()=>{ emit(W*0.5,H*0.5,0.8); lastAuto=performance.now(); }, 400);
  setTimeout(()=>{ const h=document.getElementById('hint'); if(h&&!started) h.style.opacity='0'; }, 8000);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
